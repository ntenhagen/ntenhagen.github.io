<!doctype html>
<html lang="nl">
<head>
<meta name="google" content="notranslate">
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Watertoren Webcams</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
<style>
  html,body{margin:0;height:100%;background:#000;color:#fff;font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;overflow:hidden}
  #container{position:fixed;inset:0;overflow:hidden;background:#000}
  video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000;opacity:0;transition:opacity 1s ease;will-change:opacity;backface-visibility:hidden;transform:translateZ(0)}
  video.active{opacity:1}
  .badge{position:fixed;left:12px;bottom:12px;z-index:20;background:#0008;color:#fff;border:1px solid #ffffff33;border-radius:10px;padding:6px 10px;font-size:14px;cursor:pointer;backdrop-filter:blur(4px)}
  .panel{position:fixed;left:12px;bottom:52px;z-index:21;width:260px;background:#0b0b0fcc;border:1px solid #ffffff33;border-radius:12px;padding:12px;display:none;box-shadow:0 8px 24px #0008}
  .panel.open{display:block}
  .row{display:flex;align-items:center;gap:8px;margin:8px 0}
  label{font-size:14px;opacity:.9;min-width:120px}
  input[type=number]{width:90px;padding:6px 8px;background:#111;color:#fff;border:1px solid #333;border-radius:8px}
  button{margin-top:8px;width:100%;padding:8px 10px;border-radius:10px;border:1px solid #ffffff33;background:#1d1d22;color:#fff;cursor:pointer}
</style>
</head>
<body>
  <div id="container">
    <!-- Triple buffer: current, next, reserve -->
    <video id="v0" autoplay muted playsinline webkit-playsinline preload="auto" x-webkit-airplay="allow"></video>
    <video id="v1" autoplay muted playsinline webkit-playsinline preload="auto" x-webkit-airplay="allow"></video>
    <video id="v2" autoplay muted playsinline webkit-playsinline preload="auto" x-webkit-airplay="allow"></video>
  </div>

  <div class="badge" id="badge">1/3</div>

  <div class="panel" id="panel">
    <div class="row"><label for="speed">Wisselsnelheid (sec)</label><input id="speed" type="number" min="3" step="1"></div>
    <div class="row"><label for="fade">Fade (ms)</label><input id="fade" type="number" min="0" step="100"></div>
    <button id="apply">Toepassen</button>
    <button id="fullscreen">Volledig scherm weergeven</button>
  </div>

<script>
(function(){
  const streams = [
    "https://dov.radioaalsmeer.nl:8443/hls/1059_watertoren1/index.m3u8",
    "https://dov.radioaalsmeer.nl:8443/hls/1059_watertoren2/index.m3u8",
    "https://dov.radioaalsmeer.nl:8443/hls/1059_watertoren3/index.m3u8"
  ];

  const videos = [
    document.getElementById('v0'),
    document.getElementById('v1'),
    document.getElementById('v2')
  ];

  const badge = document.getElementById('badge');
  const panel = document.getElementById('panel');
  const speedI = document.getElementById('speed');
  const fadeI = document.getElementById('fade');
  const applyBtn = document.getElementById('apply');
  const fsBtn = document.getElementById('fullscreen');

  let intervalSec = parseInt(localStorage.getItem('rotator_interval_sec') || '15', 10);
  let fadeMs      = parseInt(localStorage.getItem('rotator_fade_ms') || '1000', 10);
  speedI.value = intervalSec; fadeI.value = fadeMs;

  const nativeHls = !!videos[0].canPlayType && (videos[0].canPlayType('application/vnd.apple.mpegurl') || videos[0].canPlayType('application/x-mpegURL'));
  const useHlsJs  = window.Hls && window.Hls.isSupported && window.Hls.isSupported();

  // Eén hls.js instance per video
  const hls = [null, null, null];

  let idx = 0;             // huidige stream index (0..streams.length-1)
  let role = { current: 0, next: 1, reserve: 2 }; // mapping naar video indices
  let timers = { preload: null, switch: null };

  // Toegevoegd: array om per stream-index bij te houden tot welk tijdstip (ms) deze uitgeschakeld is
  const disabledUntil = new Array(streams.length).fill(0);

  // Toegevoegd: Bepaal de volgende camera-index die niet 'disabled' is
  function getNextIndex(fromIndex){
    // Zoek vanaf de volgende index een camera die niet is uitgeschakeld
    for(let offset=1; offset<=streams.length; offset++){
      const candidate = (fromIndex + offset) % streams.length;
      // Controleer of deze camera momenteel uitgeschakeld is
      if(disabledUntil[candidate] && Date.now() < disabledUntil[candidate]){
        // Deze camera is nog tijdelijk uitgeschakeld, probeer de volgende
        continue;
      }
      // Eventuele verstreken uitschakeltijd resetten
      if(disabledUntil[candidate] && Date.now() >= disabledUntil[candidate]){
        disabledUntil[candidate] = 0;
      }
      return candidate;
    }
    // Als alle camera's uitgeschakeld zijn, geef de oorspronkelijke index terug
    return fromIndex;
  }

  function updateBadge(){ badge.textContent = `${idx+1}/${streams.length}`; }
  function clearTimers(){ if(timers.preload){clearTimeout(timers.preload);} if(timers.switch){clearTimeout(timers.switch);} timers.preload = timers.switch = null; }

  // Fullscreen
  async function enterFullscreen(){ const el = document.documentElement; if(!document.fullscreenElement){ if(el.requestFullscreen) await el.requestFullscreen(); else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen(); else if(el.msRequestFullscreen) el.msRequestFullscreen(); } }
  async function exitFullscreen(){ if(document.fullscreenElement){ if(document.exitFullscreen) await document.exitFullscreen(); else if(document.webkitExitFullscreen) document.webkitExitFullscreen(); else if(document.msExitFullscreen) document.msExitFullscreen(); } }
  function syncFsButton(){ fsBtn.textContent = document.fullscreenElement ? 'Volledig scherm verlaten' : 'Volledig scherm weergeven'; }
  fsBtn.addEventListener('click', async ()=>{ if(!document.fullscreenElement) await enterFullscreen(); else await exitFullscreen(); syncFsButton(); });
  document.addEventListener('fullscreenchange', syncFsButton);
  document.body.addEventListener('dblclick', async ()=>{ if(!document.fullscreenElement) await enterFullscreen(); else await exitFullscreen(); });

  function safePlay(v){ v.muted=true; v.playsInline=true; v.setAttribute('playsinline',''); v.setAttribute('webkit-playsinline',''); v.play().catch(()=>{ document.body.addEventListener('click', ()=> v.play().catch(()=>{}), {once:true}); document.body.addEventListener('touchend', ()=> v.play().catch(()=>{}), {once:true, passive:true}); }); }

  function waitForFirstFrame(v){ return new Promise(resolve=>{ if(typeof v.requestVideoFrameCallback==='function'){ v.requestVideoFrameCallback(()=> resolve()); } else { const onLoaded=()=>{ v.removeEventListener('loadeddata', onLoaded); const onTU=()=>{ v.removeEventListener('timeupdate', onTU); resolve(); }; v.addEventListener('timeupdate', onTU, {once:true}); }; if(v.readyState>=2 && v.currentTime>0){ requestAnimationFrame(()=> resolve()); } else { v.addEventListener('loadeddata', onLoaded, {once:true}); } } }); }

  function attachSource(videoIndex, url){
    const v = videos[videoIndex];
    return new Promise((resolve)=>{
      const finish = async ()=>{ await waitForFirstFrame(v); resolve(); };
      if(useHlsJs && !nativeHls){
        if(hls[videoIndex]){ try{ hls[videoIndex].destroy(); }catch(e){} }
        const inst = new Hls({ liveDurationInfinity:true, enableWorker:true, lowLatencyMode:true });
        inst.attachMedia(v);
        inst.on(Hls.Events.MEDIA_ATTACHED, ()=> inst.loadSource(url));
        inst.on(Hls.Events.MANIFEST_PARSED, ()=> safePlay(v));
        inst.on(Hls.Events.LEVEL_LOADED, ()=> safePlay(v));
        inst.on(Hls.Events.ERROR, (ev, data)=>{ if(data && data.fatal){ try{ inst.destroy(); }catch(e){} setTimeout(()=> attachSource(videoIndex, url).then(resolve), 400); } });
        v.addEventListener('playing', finish, {once:true});
        hls[videoIndex] = inst;
      } else {
        if(v.src !== url) v.src = url;
        try{ v.load(); }catch(e){}
        const done = ()=>{ v.removeEventListener('loadeddata', done); v.removeEventListener('canplay', done); v.removeEventListener('playing', done); finish(); };
        v.addEventListener('loadeddata', done, {once:true});
        v.addEventListener('canplay', done, {once:true});
        v.addEventListener('playing', done, {once:true});
        safePlay(v);
      }
    });
  }

  // Core: triple-buffer switch zonder src-wijziging van de zichtbare laag
  function schedule(){
    clearTimers();
    const vCurrent = videos[role.current];
    const vNext    = videos[role.next];
    const vReserve = videos[role.reserve];

    const nextIdx = getNextIndex(idx);  // Gebruik getNextIndex om uitgeschakelde camera's over te slaan

    // Preload volgende in vNext tijdig (2s voor wissel)
    const preloadMs = Math.max(0, intervalSec*1000 - 2000);
    timers.preload = setTimeout(()=>{
      // Stel streamIndex attribuut in voor foutdetectie
      videos[role.next].dataset.streamIndex = nextIdx;
      attachSource(role.next, streams[nextIdx]);
    }, preloadMs);

    // Wissel
    timers.switch = setTimeout(async ()=>{
      // Probeer beeld op vNext, met timeout van 5s
      let timedOut = false;
      try {
        await Promise.race([
          waitForFirstFrame(vNext),
          new Promise((_, reject) => setTimeout(() => { timedOut = true; reject(new Error('timeout')); }, 5000))
        ]);
      } catch(e) {
        // Hier kunnen we de fout negeren, we controleren timedOut
      }
      if(timedOut) {
        // vNext is niet gaan spelen binnen 5s: markeer camera als defect en sla over
        disabledUntil[nextIdx] = Date.now() + 60000;
        const skipIdx = getNextIndex(idx);
        if(skipIdx === idx) {
          console.warn("Alle camera's uitgeschakeld - loop gepauzeerd");
          return; // Geen andere camera beschikbaar
        }
        // Laad de volgende werkende camera (skip) in het reserve-element
        videos[role.reserve].dataset.streamIndex = skipIdx;
        await attachSource(role.reserve, streams[skipIdx]);
        // Crossfade direct naar reserve beeld
        vReserve.classList.add('active');
        requestAnimationFrame(()=>{ requestAnimationFrame(()=>{ vCurrent.classList.remove('active'); }); });
        // Update rollen bij overslaan: huidige -> reserve, reserve -> current, next -> reserve
        const oldCurrent = role.current;
        const oldNext = role.next;
        const oldReserve = role.reserve;
        role.current = oldReserve;
        role.next = oldCurrent;
        role.reserve = oldNext;
        idx = skipIdx;
        updateBadge();
        // Preload de volgende camera na skip in nieuw 'next'
        const newNextIdx = getNextIndex(idx);
        videos[role.next].dataset.streamIndex = newNextIdx;
        attachSource(role.next, streams[newNextIdx]);
        // Ga verder met de loop
        schedule();
        return;
      }
      // Geen timeout: ga door met normale wissel

      // Stel fade duur opnieuw in (runtime aanpasbaar)
      videos.forEach(el=> el.style.transition = `opacity ${fadeMs}ms ease`);

      // Crossfade in twee animation frames om layout-jank te vermijden
      vNext.classList.add('active');
      requestAnimationFrame(()=>{ requestAnimationFrame(()=>{ vCurrent.classList.remove('active'); }); });

      // Rollen draaien: current -> reserve, next -> current, reserve -> next
      const oldCurrent = role.current;
      role.current = role.next;
      role.next    = role.reserve;
      role.reserve = oldCurrent;

      idx = nextIdx;
      updateBadge();

      // Preload de over-next in de nieuwe next (nu role.next)
      const overNextIdx = getNextIndex(idx);  // Bepaal de index voor de camera na de volgende
      // Volgende stream voorbereiden op nieuw 'next' element
      videos[role.next].dataset.streamIndex = overNextIdx;
      attachSource(role.next, streams[overNextIdx]);

      schedule();
    }, intervalSec*1000);
  }

  async function start(){
    clearTimers();
    // Reset actieve laag (verberg alle video's)
    videos.forEach(v => v.classList.remove('active'));
    // Start met huidige index in current, preload next en over-next
    videos[role.current].dataset.streamIndex = idx;  // huidige stream index instellen
    await attachSource(role.current, streams[idx]);
    await waitForFirstFrame(videos[role.current]);
    videos[role.current].classList.add('active');
    updateBadge();

    const nextIdx = getNextIndex(idx);
    const overNextIdx = getNextIndex(nextIdx);
    videos[role.next].dataset.streamIndex = nextIdx;
    attachSource(role.next, streams[nextIdx]);
    videos[role.reserve].dataset.streamIndex = overNextIdx;
    attachSource(role.reserve, streams[overNextIdx]);

    schedule();
  }

  // UI
  badge.addEventListener('click', ()=> panel.classList.toggle('open'));
  applyBtn.addEventListener('click', ()=>{
    const s = parseInt(speedI.value, 10);
    const f = parseInt(fadeI.value, 10);
    if (Number.isFinite(s) && s>=3) intervalSec = s;
    if (Number.isFinite(f) && f>=0) fadeMs = f;
    localStorage.setItem('rotator_interval_sec', String(intervalSec));
    localStorage.setItem('rotator_fade_ms', String(fadeMs));
    panel.classList.remove('open');
    start();
  });

  videos.forEach((v) => v.addEventListener('error', () => {
    const failIndex = v.dataset.streamIndex ? parseInt(v.dataset.streamIndex) : null;
    if(failIndex !== null){
      // Markeer deze camera als tijdelijk niet gebruiken
      disabledUntil[failIndex] = Date.now() + 60000;
    }
    if(failIndex === idx){
      // Huidige camera is uitgevallen: direct naar de volgende
      idx = getNextIndex(idx);
      start();
    } else {
      // Volgende/reserve camera is uitgevallen: huidige blijft, overslaan bij volgende wissel
      return;
    }
  }));

  // Watchdog: detecteer stilstand (>5s geen frame) en sla vastgelopen stream over
  let lastFrameTime = performance.now();
  videos.forEach(v=>{
    const tick=()=>{ lastFrameTime = performance.now(); if(typeof v.requestVideoFrameCallback==='function'){v.requestVideoFrameCallback(tick);} else {setTimeout(tick,500);} };
    if(typeof v.requestVideoFrameCallback==='function'){v.requestVideoFrameCallback(tick);} else {setTimeout(tick,500);} 
  });
  setInterval(()=>{
    if(performance.now() - lastFrameTime > 5000){
      // Geen frame ontvangen in >5s: huidige stream overslaan
      disabledUntil[idx] = Date.now() + 60000;
      idx = getNextIndex(idx);
      start();
    }
  }, 2000);

  // Kickoff
  start();
  syncFsButton();
})();
</script>
</body>
</html>
